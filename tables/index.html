<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap">

        <link rel="stylesheet" href="../style.css">

        <title>Tables | Study Latin</title>
    </head>
    <body>
        <header>
            <custom-menu></custom-menu>
            <a href="../" id="title">Study Latin</a>
        </header>
        <main>
            <div>
                <label>
                    Table
                    <select id="table-select">
                        <option value="" disabled selected>Select a table</option>
                    </select>
                </label>
                <label>
                    Table navigation order
                    <select id="order-select">
                        <option value="row" selected>By row</option>
                        <option value="column">By column</option>
                    </select>
                </label>
                <label>
                    Macrons
                    <custom-toggle id="use-macrons" checked></custom-toggle>
                </label>
                <label>
                    Hints
                    <custom-toggle id="use-hints"></custom-toggle>
                </label>
                <label>
                    Keyboard navigation
                    <custom-toggle id="use-keyboard-navigation" checked></custom-toggle>
                </label>
            </div>

            <div id="main-inputs">
                <table id="table"></table>
                
                <macron-character-buttons></macron-character-buttons>
            </div>
        </main>
        <footer>
            <p>Suggestions/bug reports <a href="mailto:studylatin1@gmail.com">here</a></p>
        </footer>
        
        <script src="../custom-elements.js"></script>
        <script src="../tables/tables.js"></script>
        <script src="../tables/script.js"></script>
    </body>
</html>
