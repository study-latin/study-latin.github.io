<!DOCTYPE html>

<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap">

        <link rel="stylesheet" href="../style.css">

        <title>Dates | Study Latin</title>
    </head>
    <body>
        <header>
            <custom-menu></custom-menu>
            <a href="../" id="title">Study Latin</a>
        </header>
        <main>
            <div>
                <label>
                    Years
                    <custom-toggle id="years" checked></custom-toggle>
                </label>
                <label>
                    Days + Months
                    <custom-toggle id="days" checked></custom-toggle>
                </label>
                <label>
                    English &rightarrow; Latin<custom-toggle id="to-latin" checked></custom-toggle>
                </label>
                <label>
                    Latin &rightarrow; English
                    <custom-toggle id="from-latin" checked></custom-toggle>
                </label>
                <label>
                    Macrons
                    <custom-toggle id="use-macrons" checked></custom-toggle>
                </label>
                <label>
                    Hints
                    <custom-toggle id="use-hints"></custom-toggle>
                </label>
            </div>
            
            <p id="prompt"></p>
            <input id="input" type="text">
        </main>
        <footer>
            <p>Suggestions/bug reports <a href="mailto:studylatin1@gmail.com">here</a></p>
        </footer>
        
        <script src="../custom-elements.js"></script>
        <script src="../dates/months.js"></script>
        <script src="../dates/script.js"></script>
    </body>
</html>
